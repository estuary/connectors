import:
  - ../../materialize-boilerplate/testdata/integration/collections.materialize.flow.yaml

materializations:
  acmeCo/tests/materialize-cratedb:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: simple_standard
      source: tests/simple
      fields:
        recommended: true
    - resource:
        table: simple_delta
        delta_updates: true
      source: tests/simple
      fields:
        recommended: true
    # The tests/not-simple binding is omitted: CrateDB rejects column names
    # containing dots (even when quoted), and that collection's key includes a
    # field name with a dot — which cannot be excluded via field selection.
    - resource:
        table: data_types
      source: tests/data-types
      fields:
        recommended: 1
        exclude:
          # Connector maps "duration" format to INTEGER, but test fixture stores
          # an ISO-8601 string ("P1Y2M3DT4H5M6S") — CrateDB rejects the insert.
          - stringDurationField
          # Connector maps STRING_INTEGER to NUMERIC(18,0), too narrow for the
          # fixture's uint64 max value 18446744073709551615.
          - stringUint64Field
