# import:
#   - apply-base-collection.flow.yaml

materializations:
  test/sqlite:
    endpoint:
      connector:
        image: ghcr.io/estuary/materialize-sqlite:dev
        config: {}
    bindings:
      - source: key/value
        resource: { table: key_value }
        fields:
          recommended: false
          include:
            key: {}
            requiredVal: {}
            optionalVal1: {}
        backfill: 1

collections:
  key/value:
    schema:
      type: object
      properties:
        key: { type: string }
        requiredVal: { type: boolean } # A change from string to boolean is assumed to be universally incompatible.
        optionalVal1: { type: integer }
        optionalVal2: { type: integer }
      required: [key, requiredVal, requiredVal2]
    key: [/key]