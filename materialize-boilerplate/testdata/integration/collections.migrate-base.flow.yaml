collections:
  key/value:
    schema:
      type: object
      properties:
        id: { type: integer }
        int64ToNum: { type: integer }
        int64ToNumStr: { type: integer }
        int64ToInt128: { type: integer }
        int64ToInt256: { type: integer }
        int64ToIntStr64: { type: integer }
        int64ToIntStr128: { type: integer }
        int64ToIntStr256: { type: integer }
        int128ToNum: { type: integer, maximum: 1e38 }
        int128ToNumStr: { type: integer, maximum: 1e38 }
        int128ToInt256: { type: integer, maximum: 1e38 }
        int128ToIntStr128: { type: integer, maximum: 1e38 }
        int128ToIntStr256: { type: integer, maximum: 1e38 }
        int256ToNum: { type: integer, maximum: 1e76 }
        int256ToNumStr: { type: integer, maximum: 1e76 }
        int256ToIntStr256: { type: integer, maximum: 1e76 }
        intStr64ToInt64: { type: string, format: integer }
        intStr64ToInt128: { type: string, format: integer }
        intStr64ToInt256: { type: string, format: integer }
        intStr64ToIntStr128: { type: string, format: integer }
        intStr64ToIntStr256: { type: string, format: integer }
        intStr64ToNum: { type: string, format: integer }
        intStr64ToNumStr: { type: string, format: integer }
        intStr128ToInt128: { type: string, format: integer, maxLength: 38 }
        intStr128ToInt256: { type: string, format: integer, maxLength: 38 }
        intStr128ToIntStr256: { type: string, format: integer, maxLength: 38 }
        intStr128ToNum: { type: string, format: integer, maxLength: 38 }
        intStr128ToNumStr: { type: string, format: integer, maxLength: 38 }
        intStr256ToInt256: { type: string, format: integer, maxLength: 76 }
        intStr256ToNum: { type: string, format: integer, maxLength: 76 }
        intStr256ToNumStr: { type: string, format: integer, maxLength: 76 }
        numToNumStr: { type: number }
        numStrToNum: { type: string, format: number }
        arrayToMulti: { type: array }
        binaryToMulti: { type: string, contentEncoding: base64 }
        boolToMulti: { type: boolean }
        int64ToMulti: { type: integer }
        int128ToMulti: { type: integer, maximum: 1e38 }
        int256ToMulti: { type: integer, maximum: 1e76 }
        intStr64UnionToMulti: { type: [integer, string], format: integer }
        numToMulti: { type: number }
        numStrUnionToMulti: { type: [number, string], format: number }
        objectToMulti: { type: object }
        stringToMulti: { type: string }
        binaryToString: { type: string, contentEncoding: base64 }
        intStr64ToString: { type: string, format: integer }
        intStr128ToString: { type: string, format: integer, maxLength: 38 }
        intStr256ToString: { type: string, format: integer, maxLength: 76 }
        numStrToString: { type: string, format: number }
        dateToString: { type: string, format: date }
        datetimeToString: { type: string, format: date-time }
        timeToString: { type: string, format: time }
        durationToString: { type: string, format: duration }
        ipv4ToString: { type: string, format: ipv4 }
        ipv6ToString: { type: string, format: ipv6 }
        macaddrToString: { type: string, format: macaddr }
        macaddr8ToString: { type: string, format: macaddr8 }
        uuidToString: { type: string, format: uuid }
        emailToString: { type: string, format: email }
        hostnameToString: { type: string, format: hostname }
        uriToString: { type: string, format: uri }
        uriReferenceToString: { type: string, format: uri-reference }
        uriTemplateToString: { type: string, format: uri-template }
        jsonPointerToString: { type: string, format: json-pointer }
        relativeJsonPointerToString: { type: string, format: relative-json-pointer }
        regexToString: { type: string, format: regex }
        uint32ToString: { type: string, format: uint32 }
        uint64ToString: { type: string, format: uint64, maxLength: 20 }
        iriToString: { type: string, format: iri }
        iriReferenceToString: { type: string, format: iri-reference }
      required: [id]
    key: [/id]
