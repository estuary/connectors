docs: |-
  **REFERENCE:** [Get report](https://developers.smartsheet.com/api/smartsheet/openapi/reports/getreport)

  **WHY:** checks whether `sourceSheets`/`scope` reliably expose the
  backing sheet id(s), as a candidate way to cross-reference a report
  against the Sheets stream's own cursor (an alternative to the unreliable
  report-level `modifiedSince`/`modifiedAt`, see `List Reports
  (modifiedSince)`).

  **VERIFIED (2026-07-21):** with `include=source,sourceSheets,scope`, 200
  OK returns `sourceSheets[0].id == 4312824539121540`, matching the known
  seed sheet id, plus that sheet's full column list (including columnId
  4737155282896772 for "Task", the same id used on this report's
  non-synthetic cells in `Get Report (bare)`). Confirms `sourceSheets`
  reliably identifies the backing sheet(s).

  **VERIFIED (2026-07-21):** `source` (singular) is also present —
  `{id:1977554504386436, type:"report"}` — but per the docs this is
  report-to-report copy lineage ("which report the report was created
  from, if any"), not the data source; don't use `source` for sheet
  cross-referencing.

  **UNOBSERVABLE:** requesting `include=scope` produced no top-level
  `scope` key in the response for this row report. Whether `scope`
  requires a different report shape (e.g. a summary report) to populate
  isn't resolved by a read-only probe, and isn't load-bearing since
  `sourceSheets` already answers the cross-reference question.
