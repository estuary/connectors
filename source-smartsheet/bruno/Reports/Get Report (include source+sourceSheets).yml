info:
  name: Get Report (include source+sourceSheets)
  type: http
  seq: 16

http:
  method: GET
  url: "{{base_url}}/reports/{{seed_report_id}}?include=source,sourceSheets,scope"
  params:
    - name: include
      value: source,sourceSheets,scope
      type: query

runtime:
  scripts:
    - type: before-request
      code: if (!bru.getVar('seed_report_id')) bru.setVar('seed_report_id', bru.getEnvVar('PIN_REPORT_ID'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

