info:
  name: Get Report (bare)
  type: http
  seq: 13

http:
  method: GET
  url: "{{base_url}}/reports/{{seed_report_id}}"

runtime:
  scripts:
    - type: before-request
      code: if (!bru.getVar('seed_report_id')) bru.setVar('seed_report_id', bru.getEnvVar('PIN_REPORT_ID'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

