docs: |-
  **REFERENCE:** [Get report](https://developers.smartsheet.com/api/smartsheet/openapi/reports/getreport)

  **WHY:** bare detail fetch for the `reports` stream — teaches the
  report-object envelope (`columns[]`/`rows[]` shape, cell optionality) the
  connector's row-report model is built against. Run `Seeding/A3 - Create
  Seed Report` first, or set `PIN_REPORT_ID` for an out-of-order run.

  **VERIFIED (2026-07-21):** 200 OK for report id 7840186690045828 ("Report
  1", a row report over sheet 4312824539121540 "Project Sheet") —
  `totalRowCount:7`, `accessLevel:"OWNER"`, `workspace:{id:3258769762215811,
  name:"First Project"}`, `createdAt`/`modifiedAt`/`permalink` present,
  `isSummaryReport:false`. The source sheet actually has 8 rows (see `Get
  Source Sheet (cross-check row count)`) — the report silently excludes the
  sheet's one fully-blank trailing row.

  **VERIFIED (2026-07-21):** `columns[]` has exactly 2 entries: a synthetic
  "Sheet Name" column (`sheetNameColumn:true`, no `columnId`) and the
  sheet's "Primary" column (`primary:true`) — this report only pulled 2 of
  the source sheet's 9 columns. `cells[].columnId` is confirmed OPTIONAL:
  the synthetic column's cells carry only `virtualColumnId`; every cell
  observed carries `virtualColumnId`. `rows[]` also carry `parentId`/
  `siblingId` (hierarchy/indent structure) and an optional `locked` flag
  (present only on row 1).

  **VERIFIED (2026-07-21):** no `x-ratelimit-*` response headers on this
  endpoint — contrast `Get Source Sheet (cross-check row count)`, where
  `/sheets/{id}` does send them. Don't have the connector depend on these
  headers being present; key backoff off the documented 429 body shape
  instead.

  **Limitation (VERIFIED 2026-07-21):** reports have no `version` field and
  no `rowsModifiedSince` filter, and report rows carry no per-row modified
  timestamp — the connector can only snapshot/backfill reports, never
  incrementally sync rows the way Sheets can.
