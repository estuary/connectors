info:
  name: List Reports (bare)
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_url}}/reports"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalCount=1, pageNumber=1, pageSize=100, totalPages=1 (data[] length 1)
    request:
      url: "{{base_url}}/reports"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 1,
            "pageSize": 100,
            "totalPages": 1,
            "totalCount": 1,
            "data": [
              {
                "id": 7840186690045828,
                "name": "Report 1",
                "accessLevel": "OWNER",
                "permalink": "https://app.smartsheet.eu/reports/M4gHX49JmcwMmPq4fVrPVhCH5WPF7QM5WV7wmHr1",
                "isSummaryReport": false
              }
            ]
          }

docs: |-
  **REFERENCE:** [List reports](https://developers.smartsheet.com/api/smartsheet/openapi/reports/getreports)

  **WHY:** bare list for the `reports` stream — teaches the offset-pagination
  envelope and the list-level field set; anchors the non-empty baseline
  against `List Reports (modifiedSince future narrowing check)`'s
  zero-result envelope.

  **VERIFIED (2026-07-21):** 200 OK — `{pageNumber:1, pageSize:100,
  totalPages:1, totalCount:1, data:[{id:7840186690045828, name:"Report 1",
  accessLevel:"OWNER", permalink:"https://app.smartsheet.eu/reports/...",
  isSummaryReport:false}]}`. List-level `data[]` carries only
  id/name/accessLevel/permalink/isSummaryReport — no
  modifiedAt/workspace/createdAt at list level (those only appear on the
  detail fetch, see `Get Report (bare)`).
