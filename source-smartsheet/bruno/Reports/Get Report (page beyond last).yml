info:
  name: Get Report (page beyond last)
  type: http
  seq: 15

http:
  method: GET
  url: "{{base_url}}/reports/{{seed_report_id}}?page=2&pageSize=1"
  params:
    - name: page
      value: "2"
      type: query
    - name: pageSize
      value: "1"
      type: query

runtime:
  scripts:
    - type: before-request
      code: if (!bru.getVar('seed_report_id')) bru.setVar('seed_report_id', bru.getEnvVar('PIN_REPORT_ID'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalRowCount=7, 1 rows returned x 2 columns
    request:
      url: "{{base_url}}/reports/{{seed_report_id}}?page=2&pageSize=1"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 7840186690045828,
