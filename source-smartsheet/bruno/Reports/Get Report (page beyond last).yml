docs: |-
  **REFERENCE:** [Get report](https://developers.smartsheet.com/api/smartsheet/openapi/reports/getreport)

  **WHY:** with `pageSize=1` and 7 total rows, `page=2` is in-range — a
  cheap way to confirm `page`/`pageSize` walk the row set in stable order
  without gaps/dupes, and to check whether `columns[]` repeats identically
  on every page (bearing on whether the connector must carry the column
  map across page requests or can rebuild it per page).

  **VERIFIED (2026-07-21):** 200 OK — `rows[]` contains exactly 1 row, id
  7728112740206468, `rowNumber:2` — the correct 2nd row in sort order,
  matching `Get Report (bare)`'s second row. `columns[]` is identical to
  `Get Report (bare)`'s (same 2 entries, same virtualId/title/type) even
  though this page returns only 1 row — confirms the connector can rebuild
  its virtualColumnId→title map fresh from each page's own response
  without carrying it across requests.
