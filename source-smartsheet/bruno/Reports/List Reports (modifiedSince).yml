info:
  name: List Reports (modifiedSince)
  type: http
  seq: 11

http:
  method: GET
  url: "{{base_url}}/reports?modifiedSince=2026-01-01T00:00:00Z"
  params:
    - name: modifiedSince
      value: 2026-01-01T00:00:00Z
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalCount=1, pageNumber=1, pageSize=100, totalPages=1 (data[] length 1)
    request:
      url: "{{base_url}}/reports?modifiedSince=2026-01-01T00:00:00Z"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 1,
            "pageSize": 100,
            "totalPages": 1,
            "totalCount": 1,
            "data": [
              {
                "id": 7840186690045828,
                "name": "Report 1",
                "accessLevel": "OWNER",
                "permalink": "https://app.smartsheet.eu/reports/M4gHX49JmcwMmPq4fVrPVhCH5WPF7QM5WV7wmHr1",
                "isSummaryReport": false
              }
            ]
          }

docs: |-
  **REFERENCE:** [List reports](https://developers.smartsheet.com/api/smartsheet/openapi/reports/getreports)

  **WHY:** tests whether `modifiedSince` genuinely narrows the report list.
  The docs steer users toward Get Sheet Version instead ("If you need to
  keep track of frequent changes, it may be more useful to use Get Sheet
  Version"), suggesting this reflects the report DEFINITION's modified time,
  not underlying source-sheet row changes — the basis for treating reports
  as snapshot/backfill only (see `Get Report (bare)`).

  **VERIFIED (2026-07-21):** with `modifiedSince=2026-01-01T00:00:00Z`
  (before the report's createdAt of 2026-07-07T19:49:46Z), 200 OK returns
  the report — `{pageNumber:1, pageSize:100, totalPages:1, totalCount:1,
  data:[{id:7840186690045828, name:"Report 1", ...}]}`, matching `List
  Reports (bare)`'s envelope.

  **VERIFIED (2026-07-21):** `List Reports (modifiedSince future narrowing
  check)` (same report, `modifiedSince` set after its modifiedAt) returns
  `totalCount:0` — confirms the filter genuinely narrows by a real
  timestamp comparison, not a no-op.

  **Limitation — VERIFIED (2026-07-21) via seeding:** whether
  `modifiedSince` reflects underlying source-sheet row-data changes (vs.
  only report-definition edits) needed a data-only mutation to a source
  sheet. The seeding D/E chains provided exactly that, and `List Reports
  (modifiedSince source-data-edit probe)` closed it: report
  `modifiedAt`/`modifiedSince` tracks **report-definition edits only** —
  the pinned report stayed absent from a `modifiedSince` window covering
  four data edits to its source sheet. The snapshot/backfill
  classification is confirmed by evidence, not just the docs' steer.
