info:
  name: Get Report (pageSize 10001 over-limit probe)
  type: http
  seq: 14

http:
  method: GET
  url: "{{base_url}}/reports/{{seed_report_id}}?pageSize=10001&page=1"
  params:
    - name: pageSize
      value: "10001"
      type: query
    - name: page
      value: "1"
      type: query

runtime:
  scripts:
    - type: before-request
      code: if (!bru.getVar('seed_report_id')) bru.setVar('seed_report_id', bru.getEnvVar('PIN_REPORT_ID'));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

