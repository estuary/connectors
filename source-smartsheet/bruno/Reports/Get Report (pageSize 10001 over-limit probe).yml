docs: |-
  **REFERENCE:** [Get report](https://developers.smartsheet.com/api/smartsheet/openapi/reports/getreport) — also the [Limitations guide](https://developers.smartsheet.com/api/smartsheet/guides/limitations.md) (10,000 rows/request cap)

  **WHY:** requests one more row than the documented 10,000/request cap to
  learn the enforcement mode (rejected vs. silently clamped). The seed
  report only has 7 rows, so this can't distinguish clamp-to-10000 from
  clamp-to-totalRowCount; it only confirms the request isn't outright
  rejected for exceeding the stated cap.

  **VERIFIED (2026-07-21):** `pageSize=10001` returns 200 OK, identical
  payload to `Get Report (bare)` (all 7 rows, `totalRowCount:7`) — not
  rejected with a 4xx.

  **UNOBSERVABLE:** whether the true enforcement is a silent clamp to
  10,000 or no enforcement below the cap can't be distinguished with only 7
  real rows. Not load-bearing: the connector's pagination loop walks pages
  until `rows[]` is empty or `page*pageSize >= totalRowCount` regardless of
  which is true — trust the documented 10,000/request cap.
