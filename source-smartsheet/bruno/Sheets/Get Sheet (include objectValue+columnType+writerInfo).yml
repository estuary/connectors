  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** checks the richer cell/row shape available via
  `include=objectValue,columnType,writerInfo,rowWriterInfo,format`, to
  decide whether the connector should request it by default.

  **VERIFIED (2026-07-21):** 200 OK. Rows gain `createdBy`/`modifiedBy`
  (`{name, email}`) — despite the plural param names (`writerInfo`/
  `rowWriterInfo`), the extra fields land on the ROW, not per-cell. Cells
  gain `columnType` (redundant with a `columns[]` lookup), `format` (an
  opaque comma-separated formatting string, not modeled), and
  `objectValue`. `objectValue` is redundant with `value` for this sheet's
  scalar column types (TEXT_NUMBER, PICKLIST, CONTACT_LIST, CHECKBOX all
  show identical `value`/`objectValue`) but is STRUCTURED for DATE:
  `{"objectType":"DATE","value":"2025-07-07"}` vs. plain
  `value: "2025-07-07"`.

  **UNOBSERVABLE:** whether `objectValue` round-trips cleanly for richer
  column types (MULTI_CONTACT_LIST, MULTI_PICKLIST, PREDECESSOR) — this
  sheet has `isMultiPicklistEnabled:true` at the sheet level but no column
  is actually a multi-picklist, so no such cell was observed. The
  connector does not request this `include` by default given the cost/
  complexity for redundant data on this sheet's column types; revisit if a
  production account uses those richer types.
