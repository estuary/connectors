info:
  name: List Sheets (pageSize 1 two-page walk)
  type: http
  seq: 12.5

http:
  method: GET
  url: "{{base_url}}/sheets?pageSize=1&page=2"
  params:
    - name: pageSize
      value: "1"
      type: query
    - name: page
      value: "2"
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - pageNumber=2 of totalPages=2, second sheet returned (no clamp)
    request:
      url: "{{base_url}}/sheets?pageSize=1&page=2"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 2,
            "pageSize": 1,
            "totalPages": 2,
            "totalCount": 2,
            "data": [
              {
                "id": 4312824539121540,
                "name": "Project Sheet",
                "accessLevel": "OWNER",
                "permalink": "https://app.smartsheet.eu/sheets/M4wc8jH3r8C9wCRr7FMggMq9hCw6QmMVFRCf6RQ1",
                "createdAt": "2026-07-07T13:40:44Z",
                "modifiedAt": "2026-07-21T13:59:43Z"
              }
            ]
          }

docs: |-
  **REFERENCE:** [List sheets](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/listsheets)

  **WHY:** closes the multi-page-walk question on `List Sheets (bare)` —
  when that probe ran, the account had exactly one sheet, so a second page
  could never be exercised read-only. `Seeding/A1 - Create Seed Sheet`
  later added a second sheet, so `pageSize=1&page=2` now demands a real
  second page: a non-clamped `pageNumber:2` with the *other* sheet proves
  page walking works (vs. the clamp behavior on `List Sheets (page beyond
  last clamps)`, which this must NOT reproduce for an in-range page).

  **VERIFIED (2026-07-21):** 200 OK, `{pageNumber: 2, pageSize: 1,
  totalPages: 2, totalCount: 2}` with exactly one sheet in `data[]` — the
  pinned "Project Sheet" (the seed sheet occupies page 1). A real second
  page is served, not a clamp and not a duplicate of page 1, so the
  documented `page`/`pageSize` walk contract holds on the `GET /sheets`
  list. The pinned sheet's list-level `modifiedAt` here is
  `2026-07-21T13:59:43Z`, reflecting the seeding D/E-chain edits —
  consistent with `Seeding/D2`'s finding that data edits surface at list
  level.
