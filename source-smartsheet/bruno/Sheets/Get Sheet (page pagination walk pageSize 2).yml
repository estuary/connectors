docs: |-
  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** confirms `page`/`pageSize` are real row-pagination params on the
  detail endpoint (not documented as clearly as on `/reports/{id}`, but
  claimed to work identically) and establishes the row ordering the
  connector's page walk should expect.

  **VERIFIED (2026-07-21):** `page=1&pageSize=2` returns rows
  `[3224513112835972 (row 1), 7728112740206468 (row 2)]`, `totalRowCount=8`,
  `version=0`. `pageSize=2` was walked across `page=1..4` in this session —
  rows 1-2, 3-4, 5-6, 7-8, contiguous, no gap/dupe/reorder, matching the row
  order from `Get Sheet (bare)`.

  **VERIFIED (2026-07-21):** combined with `rowsModifiedSince`, pagination is
  applied FIRST, the filter SECOND — `page=8&pageSize=1&rowsModifiedSince=<early
  date>` returns `rows: []` (page 8 of the *unfiltered* 8-row sheet is the
  all-empty row, which the filter then drops; see
  `Get Sheet (rowsModifiedSince narrows, blank-row gap)`), vs.
  `page=7&pageSize=1` with the same filter returning row 7
  unfiltered-then-kept. `totalRowCount` is therefore always the correct number
  to compute `page * pageSize >= totalRowCount` against, even when
  `rowsModifiedSince` is also set — see
  `Get Sheet (page beyond last CLAMPS not empty)` for why this matters and
  cannot be replaced with "stop when the page comes back short/empty".
