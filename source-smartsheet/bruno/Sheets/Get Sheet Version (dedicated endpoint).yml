info:
  name: Get Sheet Version (dedicated endpoint)
  type: http
  seq: 27

http:
  method: GET
  url: "{{base_url}}/sheets/{{PIN_SHEET_ID}}/version"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - version=0
    request:
      url: "{{base_url}}/sheets/{{PIN_SHEET_ID}}/version"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "version": 0
          }

docs: |-
  **REFERENCE:** [Get sheet version](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheetversion)

  **WHY:** cheapest possible "did this sheet change" signal — confirms
  `version` is a real, separate endpoint, not merely a list-summary field
  (it's not on the list summary at all, see `List Sheets (bare)`).

  **VERIFIED (2026-07-21):** 200 OK, `{"version": 0}` — matches the
  `version` field embedded in the full detail response (`Get Sheet
  (bare)`). No `x-ratelimit-*` headers on this endpoint either (see
  `Get Sheet (bare)`'s Limitation finding).

  **Limitation — VERIFIED (2026-07-21) via seeding:** whether an ordinary
  cell edit increments `version` could not be seen read-only (this sheet
  showed `version:0` despite its list-level `modifiedAt` having advanced
  past its `createdAt`, see `List Sheets (modifiedSince narrows)`). The
  hand-off to `Seeding/D1 - Edit a cell (provoke row+sheet change)` +
  `Seeding/D3 - Recheck Sheet Version after edit` closed it: an ordinary
  cell edit DOES increment `version` (0 → 1, observed ~5s after the edit,
  no lag). `version` is therefore usable as a cheap per-sheet change
  signal — see `D3` for caveats (bare counter, no timestamp or row
  attribution; a bump still needs a `rowsModifiedSince` detail poll).
