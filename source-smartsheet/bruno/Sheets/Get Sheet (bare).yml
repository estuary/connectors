docs: |-
  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** full sheet detail — confirms `columns[]`, `rows[].cells[]`
  shape, `version`, `totalRowCount`, `workspace`. This is the reference
  response the connector's `SheetDetail`/`RawRow`/`RawCell` models are
  drawn from directly.

  **VERIFIED (2026-07-21):** 200 OK. Top-level keys include `accessLevel`,
  `cellImageUploadEnabled`, `columns`, `createdAt`, `dependenciesEnabled`,
  `effectiveAttachmentOptions`, `ganttEnabled`, `hasSummaryFields`, `id`,
  `isMultiPicklistEnabled`, `modifiedAt`, `name`, `permalink`,
  `resourceManagementEnabled`, `resourceManagementType`, `rows`,
  `totalRowCount` (=8), `userPermissions`, `userSettings`, `version` (=0),
  `workspace`. 9 columns spanning CHECKBOX, TEXT_NUMBER (2 with live
  formulas), CONTACT_LIST, PICKLIST, DATE x2 (GANTT_START_DATE/
  GANTT_END_DATE tags). 8 rows, one (`rowNumber:8`, id 4772625484744580)
  with every cell empty (no `value`/`displayValue` on any cell) — the row
  that later disappears from `rowsModifiedSince`-filtered responses
  despite sharing the same `modifiedAt` as every other row (see
  `Get Sheet (rowsModifiedSince narrows, blank-row gap)`). Cells are keyed
  by `columnId` (an int matching `columns[].id`), never `virtualColumnId`
  (that join key is Reports-specific and confirmed absent here).

  **Limitation (VERIFIED 2026-07-21):** `x-ratelimit-limit`/`-remaining`/
  `-reset` headers (limit=80000) are present on this endpoint's response
  but absent on siblings like `List Sheets (bare)` and
  `Get Sheet Version (dedicated endpoint)` — they're endpoint-specific, not
  account-wide; never gate rate-limit handling on their presence.
