docs: |-
  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** sentinel future date (`rowsModifiedSince=2099-01-01`) where every
  row should be excluded — checks the envelope shape when `rows` is
  genuinely empty, so the connector doesn't mistake a filtered-to-zero
  response for a broken/empty sheet.

  **VERIFIED (2026-07-21):** 200 OK, `rows: []`, `totalRowCount: 8`
  (unchanged — confirms `totalRowCount` reports the sheet's real row count,
  not the post-filter count). Sheet metadata (`columns`, `name`, etc.) is
  still returned in full even when `rows` is empty — a filtered-to-zero
  detail request is not itself a signal that the sheet is empty.
