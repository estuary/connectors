docs: |-
  **REFERENCE:** [List sheets](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/listsheets)

  **WHY:** pins `modifiedSince`'s inclusivity at EXACT timestamp equality —
  `List Sheets (modifiedSince narrows)` only bracketed the bound with a
  past and a future date, which distinguishes `>`/`>=` at neither end. The
  bound here is the pinned sheet's exact live `modifiedAt`
  (`2026-07-21T13:59:43Z`, the `Seeding/D4` clear): membership ⇒
  `>=`-inclusive; absence ⇒ strict `>`. Needed so the connector can put
  the incremental window's lower boundary in the request itself
  (`modifiedSince = cursor + 1s`) instead of a client-side skip
  (add-stream House rule 5).

  **VERIFIED (2026-07-21):** 200 OK, `totalCount: 1` — the pinned sheet,
  whose `modifiedAt` equals the bound exactly, IS returned. The list's
  `modifiedSince` is `>=`-INCLUSIVE at exact equality, so
  `modifiedSince = cursor + 1s` yields exactly the ticks strictly after
  the cursor. NOTE the asymmetry: the detail endpoint's
  `rowsModifiedSince` is strict `>` at equality (`Get Sheet
  (rowsModifiedSince equality probe)`) — the two filters do NOT share
  boundary semantics.
