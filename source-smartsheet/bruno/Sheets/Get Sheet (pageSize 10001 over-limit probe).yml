docs: |-
  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** documented-limits +1 probe — no explicit page-size ceiling is
  stated for this endpoint the way `/reports/{id}` documents 10,000, so this
  pushes past that reports-derived number anyway as a sane upper bound to
  test for outright rejection.

  **VERIFIED (2026-07-21):** `page=1&pageSize=10001` returns 200, not
  rejected, all 8 rows returned, `totalRowCount=8`, `version=0`.

  **UNOBSERVABLE:** whether the server silently clamps to some real max below
  10001, or has no max at all — this account's 8-row sheet returns fewer rows
  than requested either way, so it can't distinguish the two. Closing this
  needs a sheet with >10,000 rows, out of scope to seed (Smartsheet's own hard
  cap is 500,000 cells/sheet, so such a sheet is possible in principle but not
  a reasonable seed). The connector requests `pageSize` 10,000
  (`DETAIL_PAGE_SIZE`, api.py), the Limitations guide's documented
  rows/request cap, and computes its loop bound from `totalRowCount` at that
  requested size (see `Get Sheet (page beyond last CLAMPS not empty)`). If a
  silent clamp below 10,000 ever exists, pages would serve fewer rows than
  the bound assumes and the walk would skip the tail of sheets larger than
  the clamp — accepted residual risk, since no lower clamp is documented.
