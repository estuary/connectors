info:
  name: List Sheets (modifiedSince narrows)
  type: http
  seq: 11

http:
  method: GET
  url: "{{base_url}}/sheets?modifiedSince=2099-01-01T00:00:00Z"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalCount=0, pageNumber=0, pageSize=100, totalPages=0 (data[] length 0)
    request:
      url: "{{base_url}}/sheets?modifiedSince=2099-01-01T00:00:00Z"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 0,
            "pageSize": 100,
            "totalPages": 0,
            "totalCount": 0,
            "data": []
          }

docs: |-
  **REFERENCE:** [List sheets](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/listsheets)

  **WHY:** proves `modifiedSince` is a real, honored filter on
  `GET /sheets` (not silently ignored), using a future sentinel so the
  narrowing is unambiguous regardless of what real timestamp the seed
  sheet carries.

  **VERIFIED (2026-07-21):** 200 OK, `{pageNumber:0, pageSize:100,
  totalPages:0, totalCount:0, data:[]}` for
  `modifiedSince=2099-01-01T00:00:00Z` — narrowed from 1 sheet to 0. A past
  date (e.g. `2026-07-07T14:00:00Z`, before the sheet's `modifiedAt` of
  `15:33:49Z`) returns the 1 sheet unfiltered, confirming `>=` semantics on
  the low end too.

  **Limitation — VERIFIED (2026-07-21) via seeding:** this probe alone only
  proves the *filter parameter* is honored — not that
  `modifiedAt`/`modifiedSince` reflects row/cell-content edits (the sheet's
  own `modifiedAt` of 15:33:49Z was *later* than every row's 13:40:44Z, so
  something had bumped the sheet-level timestamp without touching any row).
  The hand-off to `Seeding/D1 - Edit a cell (provoke row+sheet change)` +
  `Seeding/D2 - Recheck List Sheets modifiedSince after edit` closed it: an
  ordinary cell edit DOES surface through `modifiedSince`, but only after a
  (5s, 65s] list-index lag — see `D2` and the account-wide "List-index
  eventual consistency" finding in the root `docs:` block before building
  any cursor on this filter.
