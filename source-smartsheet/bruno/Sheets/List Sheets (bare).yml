info:
  name: List Sheets (bare)
  type: http
  seq: 10

http:
  method: GET
  url: "{{base_url}}/sheets"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalCount=1, pageNumber=1, pageSize=100, totalPages=1 (data[] length 1)
    request:
      url: "{{base_url}}/sheets"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 1,
            "pageSize": 100,
            "totalPages": 1,
            "totalCount": 1,
            "data": [
              {
                "id": 4312824539121540,
                "name": "Project Sheet",
                "accessLevel": "OWNER",
                "permalink": "https://app.smartsheet.eu/sheets/M4wc8jH3r8C9wCRr7FMggMq9hCw6QmMVFRCf6RQ1",
                "createdAt": "2026-07-07T13:40:44Z",
                "modifiedAt": "2026-07-07T15:33:49Z"
              }
            ]
          }

docs: |-
  **REFERENCE:** [List sheets](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/listsheets)

  **WHY:** bare `GET /sheets` for the `sheets` stream — confirms the list
  envelope shape and default page/pageSize the connector's pagination
  relies on.

  **VERIFIED (2026-07-21):** 200 OK; envelope `{pageNumber, pageSize,
  totalPages, totalCount, data[]}` with pageNumber=1, pageSize=100 (server
  default), totalPages=1, totalCount=1. The one sheet in `data[]` carries
  `id`, `name`, `accessLevel`, `permalink`, `createdAt`, `modifiedAt` — no
  `version` field on the list summary; `version` only appears on the full
  detail response and the dedicated `GET /sheets/{id}/version` (see
  `Get Sheet Version (dedicated endpoint)`).

  **Limitation — VERIFIED (2026-07-21) via seeding:** multi-page walking
  could not be exercised when this example was captured (the account then
  had exactly one sheet, hence `totalCount: 1` above). After
  `Seeding/A1 - Create Seed Sheet` added a second sheet, `List Sheets
  (pageSize 1 two-page walk)` exercised a real second page and confirmed
  the documented `page`/`pageSize` walk contract. The live list now has 2
  sheets; this saved example is dated pre-seeding evidence.
