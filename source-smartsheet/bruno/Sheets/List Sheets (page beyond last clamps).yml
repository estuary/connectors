info:
  name: List Sheets (page beyond last clamps)
  type: http
  seq: 12

http:
  method: GET
  url: "{{base_url}}/sheets?page=2&pageSize=1"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalCount=1, pageNumber=1, pageSize=1, totalPages=1 (data[] length 1)
    request:
      url: "{{base_url}}/sheets?page=2&pageSize=1"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 1,
            "pageSize": 1,
            "totalPages": 1,
            "totalCount": 1,
            "data": [
              {
                "id": 4312824539121540,
                "name": "Project Sheet",
                "accessLevel": "OWNER",
                "permalink": "https://app.smartsheet.eu/sheets/M4wc8jH3r8C9wCRr7FMggMq9hCw6QmMVFRCf6RQ1",
                "createdAt": "2026-07-07T13:40:44Z",
                "modifiedAt": "2026-07-07T15:33:49Z"
              }
            ]
          }

docs: |-
  **REFERENCE:** [List sheets](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/listsheets)

  **WHY:** documented-limits-style probe — request a page past the last
  one (totalPages=1 for this account) and record what the server does with
  an out-of-range `page`.

  **VERIFIED (2026-07-21):** 200 OK, `{pageNumber:1, pageSize:1,
  totalPages:1, totalCount:1, data:[<the one sheet>]}` for
  `page=2&pageSize=1` — the server CLAMPS to the last valid page and
  echoes the true `pageNumber` (1, not the requested 2) in the envelope.

  **Limitation (VERIFIED 2026-07-21):** a `page` past the last CLAMPS to
  the last page (returns it, not empty) rather than erroring or returning
  empty. The list endpoint's response is self-describing — it DOES carry
  `pageNumber`/`totalPages` reflecting what was actually served — so a
  `pageNumber >= totalPages` completion check is safe here; contrast the
  detail row endpoint (`Get Sheet (page beyond last CLAMPS not empty)`),
  which carries neither and must page by `totalRowCount` instead.
