info:
  name: List Sheets (includeAll)
  type: http
  seq: 13

http:
  method: GET
  url: "{{base_url}}/sheets?includeAll=true"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 - totalCount=1, pageNumber=1, pageSize=30000, totalPages=1 (data[] length 1)
    request:
      url: "{{base_url}}/sheets?includeAll=true"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: content-type
          value: application/json
      body:
        type: json
        data: |-
          {
            "pageNumber": 1,
            "pageSize": 30000,
            "totalPages": 1,
            "totalCount": 1,
            "data": [
              {
                "id": 4312824539121540,
                "name": "Project Sheet",
                "accessLevel": "OWNER",
                "permalink": "https://app.smartsheet.eu/sheets/M4wc8jH3r8C9wCRr7FMggMq9hCw6QmMVFRCf6RQ1",
                "createdAt": "2026-07-07T13:40:44Z",
                "modifiedAt": "2026-07-07T15:33:49Z"
              }
            ]
          }

docs: |-
  **REFERENCE:** [List sheets](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/listsheets)

  **WHY:** confirms `includeAll=true` is accepted as an alternative to
  walking `page`/`pageSize`, to decide whether the connector should rely
  on it instead of explicit pagination.

  **VERIFIED (2026-07-21):** 200 OK, `{pageNumber:1, pageSize:30000,
  totalPages:1, totalCount:1, data:[<the one sheet>]}` — `includeAll` is
  implemented as a sentinel `pageSize` (30000), not a distinct envelope
  shape. The connector uses explicit `page`/`pageSize` walking instead, so
  behavior is identical however many sheets an account eventually has,
  rather than depending on 30000 always being "all".
