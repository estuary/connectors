docs: |-
  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** requests a page far beyond the last valid page (8 rows / pageSize 2
  = 4 pages; requested page 100) to check whether the detail endpoint clamps
  to the last page, errors, or returns empty — this determines how the
  connector's row-pagination loop must decide when to stop.

  **VERIFIED (2026-07-21):** `page=100&pageSize=2` returns 200 with rows
  `[269025857374084, 4772625484744580]` — identical to page=4 (the last valid
  page), never empty; `totalRowCount=8`, `version=0`. Confirmed at page=5, 6,
  and 100 in this session, all identical. The response carries **no
  `pageNumber`/`totalPages` field at all** — nothing in the envelope
  distinguishes a valid last page from an out-of-range one (contrast the list
  endpoint's clamp signal in `List Sheets (page beyond last clamps)`).

  **Limitation (VERIFIED 2026-07-21):** the detail row endpoint carries no
  `pageNumber`/`totalPages` and clamps past-the-end pages (this example shows
  the last page's rows, not empty), so the connector must page by
  `totalRowCount`, never "stop when a page is empty" — see
  `Get Sheet (page pagination walk pageSize 2)`.
