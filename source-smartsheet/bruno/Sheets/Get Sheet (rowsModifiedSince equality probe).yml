docs: |-
  **REFERENCE:** [Get sheet](https://developers.smartsheet.com/api/smartsheet/openapi/sheets/getsheet)

  **WHY:** pins `rowsModifiedSince`'s inclusivity at EXACT timestamp
  equality, the counterpart of `List Sheets (modifiedSince equality probe)`
  for the detail endpoint. The bound is row `3224513112835972`'s exact live
  `modifiedAt` (`2026-07-21T13:59:43Z`, the `Seeding/D4` clear): that row's
  membership ⇒ `>=`-inclusive; absence ⇒ strict `>`. The sheet's other rows
  (`13:40:44Z`, `13:55:20Z`) sit strictly below the bound and must be
  absent either way. Needed so the connector can put the incremental
  window's lower boundary in the request itself
  (`rowsModifiedSince = cursor + 1s`) instead of a client-side skip
  (add-stream House rule 5).

  **VERIFIED (2026-07-21):** 200 OK, `rows: []` — the row whose
  `modifiedAt` equals the bound exactly is NOT returned (a bare fetch
  seconds earlier confirmed it present with that exact stamp, and the
  detail endpoint has no publishing lag, see `Seeding/D3`).
  `rowsModifiedSince` is therefore strict `>` at exact equality:
  `rowsModifiedSince = cursor` (not `cursor + 1s`) yields exactly the
  ticks strictly after the cursor. NOTE the asymmetry: the list's
  `modifiedSince` is `>=`-inclusive at equality (`List Sheets
  (modifiedSince equality probe)`) — the two filters do NOT share
  boundary semantics, so neither result may be extrapolated to the other.
