$defs:
  Meta:
    properties:
      op:
        default: u
        description: 'Operation type (c: Create, u: Update, d: Delete)'
        enum:
        - c
        - u
        - d
        title: Op
        type: string
      row_id:
        default: -1
        description: Row ID of the Document, counting up from zero, or -1 if not known
        title: Row Id
        type: integer
    title: Meta
    type: object
additionalProperties: true
description: 'One document per report: catalog/metadata only, never row data'
properties:
  _meta:
    $ref: '#/$defs/Meta'
    description: Document metadata
  id:
    title: Id
    type: integer
  effectiveAttachmentOptions:
    anyOf:
    - items:
        type: string
      type: array
    - type: 'null'
    default: null
    title: Effectiveattachmentoptions
required:
- id
title: Report
type: object
x-infer-schema: true
if:
  required:
  - _meta
  properties:
    _meta:
      required:
      - op
      properties:
        op:
          const: d
then:
  reduce:
    strategy: merge
    delete: true
