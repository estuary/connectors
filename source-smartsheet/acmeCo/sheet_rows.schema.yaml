    $ref: '#/$defs/Meta'
    description: Document metadata
  id:
    title: Id
    type: integer
required:
- id
title: SheetRow
type: object
x-infer-schema: true
if:
  required:
  - _meta
  properties:
    _meta:
      required:
      - op
      properties:
        op:
          const: d
then:
  reduce:
    strategy: merge
    delete: true
