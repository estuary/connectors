        - c
        - u
        - d
        title: Op
        type: string
      row_id:
        default: -1
        description: Row ID of the Document, counting up from zero, or -1 if not known
        title: Row Id
        type: integer
      sheet_id:
        default: -1
        description: The Smartsheet sheet this row belongs to
        title: Sheet Id
        type: integer
    title: Meta
    type: object
additionalProperties: true
properties:
