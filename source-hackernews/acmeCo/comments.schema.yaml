---
$defs:
  Meta:
    properties:
      op:
        default: u
        description: "Operation type (c: Create, u: Update, d: Delete)"
        enum:
          - c
          - u
          - d
        title: Op
        type: string
      row_id:
        default: -1
        description: "Row ID of the Document, counting up from zero, or -1 if not known"
        title: Row Id
        type: integer
    title: Meta
    type: object
description: Hacker News Comments
properties:
  _meta:
    allOf:
      - $ref: "#/$defs/Meta"
    default:
      op: u
      row_id: -1
    description: Document metadata
  id:
    title: Id
    type: integer
  deleted:
    default: false
    title: Deleted
    type: boolean
  type:
    type: string
    enum: ["comment"]
    title: Type
  by:
    anyOf:
      - type: string
      - type: "null"
    default: ~
    title: By
  time:
    format: date-time
    type: string
    title: Time
  text:
    anyOf:
      - type: string
      - type: "null"
    default: ~
    description: HTML
    title: Text
  dead:
    default: false
    title: Dead
    type: boolean
  kids:
    description: List of IDs of child comments
    items:
      type: integer
    title: Kids
    type: array
  parent:
    type: integer
    title: Parent
  score:
    type: integer
    title: Score
required:
  - id
  - type
  - time
title: Comment
type: object 