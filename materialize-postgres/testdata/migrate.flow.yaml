import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-postgres:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        include:
          # Materialize the object field so it exercises the JSON->text migration
          # (objects are FIELD_OPTIONAL and skipped by recommended selection).
          objectToString: {}
        exclude:
          # TODO: Support these migration cases.
          - durationToString
          - ipv4ToString
          - ipv6ToString
          - macaddr8ToString
          - macaddrToString
          - uuidToString
          - int000ToNumStr
          - int064ToNumStr
          - int032ToNumStr
