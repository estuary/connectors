import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-postgres:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        include:
          # Materialize the object field so it exercises the JSON->text migration
          # (objects are FIELD_OPTIONAL and skipped by recommended selection).
          objectToString: {}
        exclude:
          # TODO: Support these migration cases.
          - durationToString
          - ipv4ToString
          - ipv6ToString
          - macaddr8ToString
          - macaddrToString
          - uuidToString
          - int000ToNumStr
          - int064ToNumStr
          - int032ToNumStr
          # These type changes have no migration support in postgres
          # (NUMERIC->BIGINT and DOUBLE PRECISION->DECIMAL): Validate returns
          # INCOMPATIBLE, which the control plane would resolve by backfilling
          # the binding. The test harness doesn't emulate that resolution, so
          # exclude them rather than let Apply skip the migration and leave a
          # column type the spec doesn't expect.
          - numToNumStr
          - intStr000ToInt000
          - intStr000ToInt032
          - intStr000ToInt064
          - intStr064ToInt064
