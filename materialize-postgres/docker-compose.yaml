version: "3.7"

services:
  postgres:
    image: 'postgres:latest'
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "synchronous_commit=off"
    shm_size: 2g
    environment:
      {
        "POSTGRES_DB": "flow",
        "POSTGRES_USER": "flow",
        "POSTGRES_PASSWORD": "flow"
      }
    networks:
      - flow-test
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5435:5432"
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow -d flow"]
      interval: 1s
      timeout: 5s
      retries: 20

networks:
  flow-test:
    name: flow-test
    external: true

volumes:
  postgres_data: {}
