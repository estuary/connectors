import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-dynamodb:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        exclude:
          - intStr256ToString
          # TODO: DynamoDB rejects numeric values with more than 38 digits
          # (`ValidationException: DynamoDB only supports precision up to 38
          # digits`). Fixture values for int128/int129/int256/int257 (39-77
          # digits) trigger this in BatchWriteItem when stored in either the
          # source column (base phase) or migrated target column.
          - int128ToNum
          - int128ToNumStr
          - int128ToInt129
          - int128ToInt256
          - int128ToInt257
          - int128ToIntStr128
          - int128ToIntStr129
          - int128ToIntStr256
          - int128ToIntStr257
          - int128ToString
          - int129ToString
          - int256ToString
          - int257ToString
          - int129ToNum
          - int129ToNumStr
          - int129ToInt256
          - int129ToInt257
          - int129ToIntStr129
          - int129ToIntStr256
          - int129ToIntStr257
          - int256ToNum
          - int256ToNumStr
          - int256ToInt257
          - int256ToIntStr256
          - int256ToIntStr257
          - int257ToNum
          - int257ToNumStr
          - int257ToIntStr257
          - intStr129ToInt129
          - intStr129ToInt256
          - intStr129ToInt257
          - intStr129ToIntStr256
          - intStr129ToIntStr257
          - intStr129ToNum
          - intStr129ToNumStr
          - intStr256ToInt256
          - intStr256ToInt257
          - intStr256ToIntStr257
          - intStr256ToNum
          - intStr256ToNumStr
          - intStr257ToInt257
          - intStr257ToNum
          - intStr257ToNumStr
          - int000ToInt128
          - int000ToInt129
          - int000ToInt256
          - int000ToInt257
          - int000ToIntStr129
          - int000ToIntStr256
          - int000ToIntStr257
          - int032ToInt128
          - int032ToInt129
          - int032ToInt256
          - int032ToInt257
          - int032ToIntStr129
          - int032ToIntStr256
          - int032ToIntStr257
          - int064ToInt128
          - int064ToInt129
          - int064ToInt256
          - int064ToInt257
          - int064ToIntStr129
          - int064ToIntStr256
          - int064ToIntStr257
          - int065ToInt128
          - int065ToInt129
          - int065ToInt256
          - int065ToInt257
          - int065ToIntStr129
          - int065ToIntStr256
          - int065ToIntStr257
          - intStr000ToInt128
          - intStr000ToInt129
          - intStr000ToInt256
          - intStr000ToInt257
          - intStr000ToIntStr129
          - intStr000ToIntStr256
          - intStr000ToIntStr257
          - intStr064ToInt128
          - intStr064ToInt129
          - intStr064ToInt256
          - intStr064ToInt257
          - intStr064ToIntStr129
          - intStr064ToIntStr256
          - intStr064ToIntStr257
          - intStr065ToInt128
          - intStr065ToInt129
          - intStr065ToInt256
          - intStr065ToInt257
          - intStr065ToIntStr129
          - intStr065ToIntStr256
          - intStr065ToIntStr257
          - intStr128ToInt128
          - intStr128ToInt129
          - intStr128ToInt256
