import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-databricks:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        exclude:
          # TODO: to_json(struct(... AS field)) in loadQueryNoFlowDocument uses
          # the raw projection name as the struct field alias, which fails to
          # parse for names with characters that aren't valid Databricks
          # identifiers (without backtick quoting).
          - binary"With"Quote
          - stringToBinary"With"Quote
          # TODO: Databricks NUMERIC(38,0) overflows on int128/int129/int256/int257
          # values (39+ digits). The JSON reader parses them as DOUBLE and the
          # staging cast fails in ANSI mode with NUMERIC_VALUE_OUT_OF_RANGE,
          # whether the column is the source (base phase) or migrated target.
          - int128ToNum
          - int128ToNumStr
          - int128ToInt129
          - int128ToInt256
          - int128ToInt257
          - int128ToIntStr128
          - int128ToIntStr129
          - int128ToIntStr256
          - int128ToIntStr257
          - int128ToMulti
          - int128ToString
          - int129ToNum
          - int129ToNumStr
          - int129ToInt256
          - int129ToInt257
          - int129ToIntStr129
          - int129ToIntStr256
          - int129ToIntStr257
          - int129ToString
          - int256ToNum
          - int256ToNumStr
          - int256ToInt257
          - int256ToIntStr256
          - int256ToIntStr257
          - int256ToMulti
          - int256ToString
          - int257ToNum
          - int257ToNumStr
          - int257ToIntStr257
          - int257ToString
          - int000ToInt128
          - int000ToInt129
          - int000ToInt256
          - int000ToInt257
          - int032ToInt128
          - int032ToInt129
          - int032ToInt256
          - int032ToInt257
          - int064ToInt128
          - int064ToInt129
          - int064ToInt256
          - int064ToInt257
          - int065ToInt128
          - int065ToInt129
          - int065ToInt256
          - int065ToInt257
          - intStr000ToInt128
          - intStr000ToInt129
          - intStr000ToInt256
          - intStr000ToInt257
          - intStr064ToInt128
          - intStr064ToInt129
          - intStr064ToInt256
          - intStr064ToInt257
          - intStr065ToInt128
          - intStr065ToInt129
          - intStr065ToInt256
          - intStr065ToInt257
          - intStr128ToInt128
          - intStr128ToInt129
          - intStr128ToInt256
          - intStr128ToInt257
          - intStr129ToInt129
          - intStr129ToInt256
          - intStr129ToInt257
          - intStr256ToInt256
          - intStr256ToInt257
          - intStr257ToInt257
