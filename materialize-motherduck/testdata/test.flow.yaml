import:
  - ../../materialize-boilerplate/testdata/integration/collections.flow.yaml

materializations:
  acmeCo/tests/materialize-motherduck/s3:
    endpoint:
      local:
        command:
          - go
          - run
          - .
        protobuf: true
        config: config.s3.yaml
    bindings: &bindings
    - resource:
        table: simple_standard
      source: tests/simple
      fields:
        recommended: true
    - resource:
        table: simple_delta
        delta_updates: true
      source: tests/simple
      fields:
        recommended: true
    - resource:
        table: not_simple
      source: tests/not-simple
      fields:
        recommended: true
        exclude:
          - 'a"string`with`quote''characters' # TODO(whb): Fix
    - resource:
        table: data_types
      source: tests/data-types
      fields:
        recommended: 1
        exclude:
          - stringDurationField # TODO(whb): Fix

  acmeCo/tests/materialize-motherduck/gcs:
    endpoint:
      local:
        command:
          - go
          - run
          - .
        protobuf: true
        config: config.gcs.yaml
    bindings: *bindings
