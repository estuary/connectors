services:
  polaris:
    image: apache/polaris:latest
    environment:
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,root,s3cr3t
      AWS_ACCESS_KEY_ID: flow
      AWS_SECRET_ACCESS_KEY: flow
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://rustfs:9000
      JAVA_OPTS_APPEND: "-Xms128m -Xmx128m -XX:TieredStopAtLevel=1"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8182/q/health" ]
      interval: 2s
      timeout: 10s
      retries: 5
      start_period: 10s
    depends_on:
      rustfs:
        condition: service_healthy
    networks:
      materialize-s3-iceberg:
    ports:
      - "9700:8181" # catalog API
      - "9701:8182" # management/health

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: flow
      RUSTFS_SECRET_KEY: flow
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: :9000
    healthcheck:
      test:
        [
          "CMD", "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 5s
    networks:
      materialize-s3-iceberg:
    ports:
      - "9702:9000"

networks:
  materialize-s3-iceberg:
