name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_base_image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare
        id: prep
        run: |
          TAG=$(echo $GITHUB_SHA | head -c7)
          echo ::set-output name=tag::${TAG}
          VERSION=$(cat base-image/VERSION | tr -d '\n')
          echo ::set-output name=version::${VERSION}

      - name: Login to GitHub package docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host

      - name: Build base-image Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-image/Dockerfile
          load: true
          tags: ghcr.io/estuary/base-image:local

      - name: Push base-image image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-image/Dockerfile
          push: true
          tags: ghcr.io/estuary/base-image:${{ steps.prep.outputs.tag }}

      - name: Push base-image image with 'dev' tag
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: base-image/Dockerfile
          push: true # See 'if' above
          tags: ghcr.io/estuary/base-image:dev,ghcr.io/estuary/base-image:${{ steps.prep.outputs.version }}

  build_connectors:
    runs-on: ubuntu-24.04
    needs: build_base_image
    strategy:
      fail-fast: false
      matrix:
        connector:
          - source-alpaca
          - source-bigquery-batch
          - source-db2-batch
          - source-dropbox
          - source-dynamodb
          - source-firestore
          - source-ga4-bigquery
          - source-gcs
          - source-google-drive
          - source-google-pubsub
          - source-hello-world
          - source-http-file
          - source-http-ingest
          - source-kafka
          - source-kinesis
          - source-mongodb
          - source-mysql
          - source-mysql-batch
          - source-onedrive
          - source-oracle
          - source-oracle-batch
          - source-postgres
          - source-postgres-batch
          - source-redshift-batch
          - source-s3
          - source-sftp
          - source-sharepoint
          - source-snowflake
          - source-sqlserver
          - source-sqlserver-batch
          - source-sqlserver-ct
          - source-sqs
          - source-test
          - source-azure-blob-storage
          - materialize-azure-blob-parquet
          - materialize-azure-fabric-warehouse
          - materialize-bigquery
          - materialize-bigtable
          - materialize-clickhouse
          - materialize-databricks
          - materialize-dynamodb
          - materialize-elasticsearch
          - materialize-eventbridge
          - materialize-gcs-csv
          - materialize-gcs-parquet
          - materialize-google-pubsub
          - materialize-google-sheets
          - materialize-hubspot
          - materialize-iceberg
          - materialize-kafka
          - materialize-mongodb
          - materialize-motherduck
          - materialize-mysql
          - materialize-pinecone
          - materialize-postgres
          - materialize-redshift
          - materialize-s3-csv
          - materialize-s3-iceberg
          - materialize-s3-parquet
          - materialize-slack
          - materialize-snowflake
          - materialize-sns
          - materialize-spanner
          - materialize-sqlite
          - materialize-sqlserver
          - materialize-webhook
        include:
          - connector: source-criteo
            connector_type: capture
            python: true
          - connector: source-shopify
            connector_type: capture
            python: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare
        id: prep
        run: |
          TAG=$(echo $GITHUB_SHA | head -c7)
          echo ::set-output name=tag::${TAG}
          VERSION=$(cat ${{ matrix.connector }}/VERSION | tr -d '\n')
          echo ::set-output name=version::${VERSION}
          VARIANTS="${{ matrix.connector }} $(cat ${{ matrix.connector }}/VARIANTS 2>/dev/null || true)"
          echo ::set-output name=variants::${VARIANTS}

      - name: Download latest Flow release binaries and add them to $PATH
        run: |
          ./fetch-flow.sh
          echo "${PWD}/flow-bin" >> $GITHUB_PATH

      - name: Authenticate with GCloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Login to GitHub package docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            network=host

      - name: Create docker network flow-test
        run: docker network create flow-test

      - name: Start Dockerized test infrastructure
        if: |
          contains(fromJson('[
            "source-db2-batch",
            "source-dynamodb",
            "source-kafka",
            "source-kinesis",
            "source-mysql",
            "source-mysql-batch",
            "source-postgres",
            "source-postgres-batch",
            "source-sftp",
            "source-sqlserver",
            "source-sqlserver-batch",
            "source-sqlserver-ct",
            "source-sqs",
            "source-mongodb"
            ]'), matrix.connector)
        run: |
          set +e # Show logs even if startup fails
          docker compose --file ${{ matrix.connector }}/docker-compose.yaml up --wait
          docker logs ${{ matrix.connector }}-db-1

      - name: Test setup
        if: matrix.connector == 'source-mongodb'
        run: |
          bash source-mongodb/docker-compose-init.sh

      # Go connector tests which aren't run as part of Dockerfile builds. Most Go connectors
      # run their tests as part of the Docker build, but running the tests outside of there
      # makes GCP credentials plumbing for encrypted configs significantly simpler.
      - name: Go Connector ${{ matrix.connector }} Database Tests
        if: |
          contains(fromJson('[
            "source-ga4-bigquery",
            "source-postgres",
            "source-redshift-batch",
            "source-sqlserver",
            "source-sqlserver-ct",
            "source-sqs"
            ]'), matrix.connector)
        run: |
          ${{ matrix.connector }}/run_tests.sh
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          # The estuary/flow repository contains a few large files in Git LFS. This can
          # present an issue with Go module checksums when using a commit-tagged version,
          # because a commit-tagged version will be fetched from VCS using `git archive`
          # and the resulting data will differ depending on whether Git LFS is installed
          # on the machine running the build, and so there are two "valid" checksums but
          # only one can match what's in go.sum / sum.golang.org
          #
          # When we're using a proper release version this isn't an issue, because there's
          # a prebuilt zip file available from proxy.golang.org which will be the same for
          # everyone. But we set this here so that the behavior in the GitHub CI runner
          # (which has LFS installed) will match the Docker builder we use (which doesn't)
          # even when using a commit pseudo-version.
          GIT_LFS_SKIP_SMUDGE: 1

      - name: Build ${{ matrix.connector }} Docker Image
        uses: docker/build-push-action@v6
        if: ${{!matrix.python}}
        with:
          context: .
          file: ${{ matrix.connector }}/Dockerfile
          load: true
          build-args: BASE_IMAGE=ghcr.io/estuary/base-image:${{ steps.prep.outputs.tag }}
          tags: ghcr.io/estuary/${{ matrix.connector }}:local

      - name: Build ${{ matrix.connector }} Python Docker Image
        uses: docker/build-push-action@v6
        if: ${{matrix.python}}
        with:
          context: .
          file: python/Dockerfile
          load: true
          build-args: |
            CONNECTOR_NAME=${{matrix.connector}}
            CONNECTOR_TYPE=${{matrix.connector_type}}
          tags: ghcr.io/estuary/${{ matrix.connector }}:local

      - name: Setup Python for ${{ matrix.connector }}
        uses: actions/setup-python@v5
        if: ${{matrix.python}}
        with:
          python-version: '3.11'

      - name: Install Poetry
        if: ${{matrix.python}}
        uses: snok/install-poetry@v1

      - name: Python connector ${{ matrix.connector }} snapshot tests
        if: ${{matrix.python}}
        run: |
          cd ${{matrix.connector}};
          poetry install;
          source $(poetry env info --path)/bin/activate
          cd ..;
          pytest ${{matrix.connector}}/tests;

      - name: Source connector ${{ matrix.connector }} integration tests
        if: |
          contains(fromJson('[
            "source-dynamodb",
            "source-gcs",
            "source-kinesis",
            "source-mysql",
            "source-postgres",
            "source-kafka",
            "source-s3",
            "source-sftp",
            "source-sqlserver"
            ]'), matrix.connector)
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          MYSQL_DATABASE: test

        run: CONNECTOR=${{ matrix.connector }} VERSION=local ./tests/run.sh;

      - name: Install duckdb
        if: matrix.connector == 'materialize-motherduck' || matrix.connector == 'materialize-s3-iceberg'
        uses: opt-nc/setup-duckdb-action@v1.2.9
        with:
          version: v1.3.1

      - name: Install system dependencies for Rust connectors
        if: matrix.connector == 'materialize-kafka'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config cmake libssl-dev libsasl2-dev libclang-dev

      - name: Materialization connector ${{ matrix.connector }} integration tests
        if: startsWith(matrix.connector, 'materialize-')

        run: |
          CONNECTOR=${{ matrix.connector }} VERSION=local tests/materialize/run.sh;

      - name: Push ${{ matrix.connector }} image(s) with commit SHA tag
        run: |
          for VARIANT in ${{ steps.prep.outputs.variants }}; do
            echo "Building and pushing ${VARIANT}:${{ steps.prep.outputs.tag }}...";
            docker build --build-arg BASE_CONNECTOR=ghcr.io/estuary/${{ matrix.connector }}:local \
                         --build-arg DOCS_URL=https://go.estuary.dev/${VARIANT} \
                         --tag ghcr.io/estuary/${VARIANT}:${{ steps.prep.outputs.tag }} \
                         --file connector-variant.Dockerfile .;
            docker image push ghcr.io/estuary/${VARIANT}:${{ steps.prep.outputs.tag }};
          done

      - name: Push ${{ matrix.connector }} image(s) with 'dev' and '${{ steps.prep.outputs.version }}' tags
        if: ${{ github.event_name == 'push' }}
        run: |
          for VARIANT in ${{ steps.prep.outputs.variants }}; do
            docker image tag ghcr.io/estuary/${VARIANT}:${{ steps.prep.outputs.tag }} ghcr.io/estuary/${VARIANT}:dev;
            docker image tag ghcr.io/estuary/${VARIANT}:${{ steps.prep.outputs.tag }} ghcr.io/estuary/${VARIANT}:${{ steps.prep.outputs.version }};
            docker image push ghcr.io/estuary/${VARIANT}:dev;
            docker image push ghcr.io/estuary/${VARIANT}:${{ steps.prep.outputs.version }};
          done

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            connector:
              - "${{ matrix.connector }}/**"

      # Re-queue connector tag publishing over PostgREST (HTTPS) instead of a direct
      # psql connection from CI.
      - name: Re-queue connector tags for ${{ matrix.connector }}
        if: github.event_name == 'push' && steps.filter.outputs.connector == 'true'
        env:
          RT_ID: ${{ secrets.CONNECTOR_REFRESH_RT_ID }}
          RT_SECRET: ${{ secrets.CONNECTOR_REFRESH_RT_SECRET }}
        run: |
          set -euo pipefail
          SUPABASE_URL="https://eyrcnmuzzyriypdajwdk.supabase.co"
          # Public anon key, used only as the PostgREST apikey header.
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5cmNubXV6enlyaXlwZGFqd2RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE2NDg3NTA1NzksImV4cCI6MTk2NDMyNjU3OX0.y1OyXD3-DYMz10eGxzo1eeamVMMUwIIeOoMryTRAoco"

          access_token=$(curl -sS -X POST "$SUPABASE_URL/rest/v1/rpc/generate_access_token" \
            -H "apikey: $ANON_KEY" -H "Content-Type: application/json" \
            -d "{\"refresh_token_id\": \"$RT_ID\", \"secret\": \"$RT_SECRET\"}" | jq -r '.access_token')
          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "failed to obtain control-plane access token"; exit 1
          fi

          for VARIANT in ${{ steps.prep.outputs.variants }}; do
            echo "Re-queuing tags for ghcr.io/estuary/${VARIANT}";
            curl -sS --fail-with-body -X POST "$SUPABASE_URL/rest/v1/rpc/requeue_connector_tag" \
              -H "apikey: $ANON_KEY" -H "Authorization: Bearer $access_token" \
              -H "Content-Type: application/json" \
              -d "{\"image_name\": \"ghcr.io/estuary/${VARIANT}\", \"image_tags\": [\":${{ steps.prep.outputs.version }}\", \":dev\"]}";
          done
