import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-clickhouse:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        include:
          # Materialize the object field so it exercises the JSON->text migration
          # (objects are FIELD_OPTIONAL and skipped by recommended selection).
          objectToString: {}
        exclude:
          # ClickHouse's largest signed integer is Int256, so Int257 fixture
          # values are stored as String. Migrating String → Float64 is not
          # supported by the connector (logs "existing field type mismatch
          # without migration support"), so the post-migration insert of
          # Float64 values into the unchanged String columns fails.
          - int257ToNum
          - int257ToNumStr
          - intStr257ToNum
          - intStr257ToNumStr
