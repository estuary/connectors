# Same workload as 100gb-3tx-overlap, but with automatic clustering enabled.
collections:
  - name: bench/wide
    schema:
      type: object
      if:
        properties:
          _meta:
            properties: { op: { const: d } }
      then:
        reduce: { delete: true, strategy: lastWriteWins }
      properties:
        id:          { type: integer }
        val:         { type: integer }
        cluster_key: { type: string, enum: [ck0, ck1, ck2, ck3, ck4, ck5, ck6, ck7, ck8, ck9] }
        payload:     { type: string }
        _meta:
          type: object
          properties: { op: { type: string } }
          required: [op]
      required: [id, _meta]
    key: [/id]
    resource:
      table: wide
      clustering: [cluster_key]

transactions:
  - total_size: 33GB
    doc_size:   1KB
    op: c

  - total_size: 33GB
    doc_size:   1KB
    overlaps:
      - { with: 0, fraction: 0.25, op: u }

  - total_size: 34GB
    doc_size:   1KB
    overlaps:
      - { with: 1, fraction: 0.50, op: u }
