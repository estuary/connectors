# Many small documents -- exercises per-row overhead in the connector.
# 50M docs at 128B each = ~6.1 GB.
collections:
  - name: bench/tiny
    schema:
      type: object
      if:
        properties:
          _meta:
            properties: { op: { const: d } }
      then:
        reduce: { delete: true, strategy: lastWriteWins }
      properties:
        id:      { type: integer }
        payload: { type: string }
        _meta:
          type: object
          properties: { op: { type: string } }
          required: [op]
      required: [id, _meta]
    key: [/id]

transactions:
  - doc_count: 25_000_000
    doc_size:  128
    op: c

  - doc_count: 25_000_000
    doc_size:  128
    overlaps:
      - { with: 0, fraction: 0.10, op: u }
      - { with: 0, fraction: 0.05, op: d }
