# Medium-sized documents; total ~1 GB — safe for default Docker disk.
# 500 docs at 1MB each per transaction.
collections:
  - name: bench/medium
    schema:
      type: object
      if:
        properties:
          _meta:
            properties: { op: { const: d } }
      then:
        reduce: { delete: true, strategy: lastWriteWins }
      properties:
        id:      { type: integer }
        payload: { type: string }
        _meta:
          type: object
          properties: { op: { type: string } }
          required: [op]
      required: [id, _meta]
    key: [/id]

transactions:
  # Tx 0: 500 MB fresh creates.
  - doc_count: 500
    doc_size:  1MB
    op: c

  # Tx 1: 500 MB; 40% update keys from tx 0, 60% fresh.
  - doc_count: 500
    doc_size:  1MB
    overlaps:
      - { with: 0, fraction: 0.40, op: u }
