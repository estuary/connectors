// Corpus schema for the differential tests in src/document.rs, exercising
// every field shape the connector can encounter in registry protobuf
// payloads. Compiled at test time with protox.
syntax = "proto3";

package differential;

import "google/protobuf/any.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

enum Corner {
  CORNER_UNSPECIFIED = 0;
  CORNER_A = 1;
  CORNER_B = 2;
}

message Nested {
  string name = 1;
  float ratio = 2;
  repeated double samples = 3;
}

message Everything {
  double f_double = 1;
  float f_float = 2;
  int32 f_int32 = 3;
  int64 f_int64 = 4;
  uint32 f_uint32 = 5;
  uint64 f_uint64 = 6;
  sint32 f_sint32 = 7;
  sint64 f_sint64 = 8;
  fixed32 f_fixed32 = 9;
  fixed64 f_fixed64 = 10;
  sfixed32 f_sfixed32 = 11;
  sfixed64 f_sfixed64 = 12;
  bool f_bool = 13;
  string f_string = 14;
  bytes f_bytes = 15;
  Corner f_enum = 16;
  Nested f_message = 17;

  repeated string r_string = 18;
  repeated float r_float = 19;
  repeated Nested r_message = 20;

  map<string, string> m_string = 21;
  map<int32, Nested> m_int32 = 22;
  map<int64, string> m_int64 = 23;
  map<uint64, string> m_uint64 = 24;
  map<bool, string> m_bool = 25;

  optional int32 opt_int32 = 26;

  oneof choice {
    string one_string = 27;
    Nested one_message = 28;
  }

  google.protobuf.Timestamp wkt_timestamp = 29;
  google.protobuf.Duration wkt_duration = 30;
  google.protobuf.Struct wkt_struct = 31;
  google.protobuf.Value wkt_value = 32;
  google.protobuf.ListValue wkt_list = 33;
  google.protobuf.DoubleValue wrap_double = 34;
  google.protobuf.FloatValue wrap_float = 35;
  google.protobuf.Int64Value wrap_int64 = 36;
  google.protobuf.UInt64Value wrap_uint64 = 37;
  google.protobuf.BoolValue wrap_bool = 38;
  google.protobuf.StringValue wrap_string = 39;
  google.protobuf.BytesValue wrap_bytes = 40;
  google.protobuf.FieldMask wkt_mask = 41;
  optional google.protobuf.NullValue f_null = 42;
  google.protobuf.Any f_any = 43;

  // Collides with the metadata field the connector reserves. Captured
  // documents must keep only the connector's _meta.
  string _meta = 44;
}
