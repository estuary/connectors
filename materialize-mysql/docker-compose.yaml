version: "3.7"

services:
  mysql:
    image: 'mysql:5.7'
    platform: linux/amd64
    command:
      - "mysqld"
      - "--innodb-buffer-pool-size=1G"
      - "--innodb-log-file-size=512M"
      - "--innodb-flush-method=O_DIRECT"
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-page-size=65536"
    environment: {"MYSQL_DATABASE": "flow", "MYSQL_USER": "flow", "MYSQL_PASSWORD": "flow", "MYSQL_ROOT_PASSWORD": "flow"}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flow-test
    deploy:
      resources:
        limits:
          memory: 4g
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h 127.0.0.1 -u $$MYSQL_USER --password=$$MYSQL_PASSWORD --port 3306 --execute 'SHOW DATABASES;'"]
      interval: 1s
      retries: 30
    ports:
      - "3306:3306"

  mariadb:
    image: 'mariadb:11.5'
    platform: linux/amd64
    environment: {"MYSQL_DATABASE": "flow", "MYSQL_USER": "flow", "MYSQL_PASSWORD": "flow", "MYSQL_ROOT_PASSWORD": "flow"}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - flow-test
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 1s
      retries: 30
    ports:
      - "3305:3306"

  singlestore:
    image: 'ghcr.io/singlestore-labs/singlestoredb-dev:latest'
    platform: linux/amd64
    environment:
      ROOT_PASSWORD: flow
    volumes:
      - singlestore_data:/data
      - ./testdata/setup-singlestore.sql:/init.sql:ro
    networks:
      - flow-test
    ports:
      - "3307:3306"

networks:
  flow-test:
    name: flow-test
    external: true

volumes:
  mysql_data: {}
  mariadb_data: {}
  singlestore_data: {}
