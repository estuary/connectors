collections:
  key/value:
    schema:
      type: object
      properties:
        key: { type: string }
      required: [key]
    key: [/key]

materializations:
  acmeCo/tests/materialize-mysql/mysql:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.mysql.yaml
    bindings: &bindings
      - source: key/value
        resource: { table: testing }
        fields:
          recommended: true

  acmeCo/tests/materialize-mysql/singlestore:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.singlestore.yaml
    bindings: *bindings

  acmeCo/tests/materialize-mysql/mariadb:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.mariadb.yaml
    bindings: *bindings