import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-mysql/mysql:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.mysql.yaml
    bindings: &bindings
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        include:
          # Materialize the object field so it exercises the JSON->text migration
          # (objects are FIELD_OPTIONAL and skipped by recommended selection).
          objectToString: {}

  acmeCo/tests/materialize-mysql/mariadb:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.mariadb.yaml
    bindings: *bindings
