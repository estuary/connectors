      $schema: "http://json-schema.org/draft-07/schema#"
      additionalProperties: true
      description: "A project's sender email address."
      properties:
        emailAddress:
          description: The email address.
          type: string
        projectId:
          type: string
      required:
        - projectId
      type: object
    key:
      - /projectId
