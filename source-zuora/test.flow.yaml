---
import:
  - acmeCo/flow.yaml
captures:
  acmeCo/source-zuora:
    endpoint:
      local:
        command:
          - python
          - "-m"
          - source_zuora
        config: config.yaml
    bindings:
      - resource:
          name: Account
          interval: PT5M
        target: acmeCo/Account
      - resource:
          name: AccountingCode
          interval: PT5M
        target: acmeCo/AccountingCode
      - resource:
          name: AccountingPeriod
          interval: PT5M
        target: acmeCo/AccountingPeriod
      - resource:
          name: Amendment
          interval: PT5M
        target: acmeCo/Amendment
      - resource:
          name: BillingRun
          interval: PT5M
        target: acmeCo/BillingRun
      - resource:
          name: CommunicationProfile
          interval: PT5M
        target: acmeCo/CommunicationProfile
      - resource:
          name: Contact
          interval: PT5M
        target: acmeCo/Contact
      - resource:
          name: ContactSnapshot
          interval: PT5M
        target: acmeCo/ContactSnapshot
      - resource:
          name: CreditBalanceAdjustment
          interval: PT5M
        target: acmeCo/CreditBalanceAdjustment
      - resource:
          name: DiscountAppliedMetrics
          interval: PT5M
        target: acmeCo/DiscountAppliedMetrics
      - resource:
          name: Export
          interval: PT5M
        target: acmeCo/Export
