          name: ProductRatePlan
          interval: PT5M
        target: acmeCo/ProductRatePlan
      - resource:
          name: ProductRatePlanCharge
          interval: PT5M
        target: acmeCo/ProductRatePlanCharge
      - resource:
          name: ProductRatePlanChargeTier
          interval: PT5M
        target: acmeCo/ProductRatePlanChargeTier
      - resource:
          name: RatePlan
          interval: PT5M
        target: acmeCo/RatePlan
      - resource:
          name: RatePlanCharge
          interval: PT5M
        target: acmeCo/RatePlanCharge
      - resource:
          name: RatePlanChargeTier
          interval: PT5M
        target: acmeCo/RatePlanChargeTier
      - resource:
          name: Refund
          interval: PT5M
        target: acmeCo/Refund
      - resource:
          name: RevenueChargeSummaryItem
          interval: PT5M
        target: acmeCo/RevenueChargeSummaryItem
