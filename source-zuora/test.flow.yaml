          name: Import
          interval: PT5M
        target: acmeCo/Import
      - resource:
          name: Invoice
          interval: PT5M
        target: acmeCo/Invoice
      - resource:
          name: InvoiceItem
          interval: PT5M
        target: acmeCo/InvoiceItem
      - resource:
          name: InvoiceItemAdjustment
          interval: PT5M
        target: acmeCo/InvoiceItemAdjustment
      - resource:
          name: JournalEntry
          interval: PT5M
        target: acmeCo/JournalEntry
      - resource:
          name: JournalEntryItem
          interval: PT5M
        target: acmeCo/JournalEntryItem
      - resource:
          name: JournalRun
          interval: PT5M
        target: acmeCo/JournalRun
      - resource:
          name: Payment
          interval: PT5M
        target: acmeCo/Payment
      - resource:
          name: PaymentMethod
          interval: PT5M
        target: acmeCo/PaymentMethod
      - resource:
          name: PaymentMethodSnapshot
          interval: PT5M
        target: acmeCo/PaymentMethodSnapshot
      - resource:
          name: PaymentRun
          interval: PT5M
        target: acmeCo/PaymentRun
      - resource:
          name: ProcessedUsage
          interval: PT5M
        target: acmeCo/ProcessedUsage
      - resource:
          name: Product
          interval: PT5M
        target: acmeCo/Product
