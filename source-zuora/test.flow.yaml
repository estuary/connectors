          name: RevenueScheduleItemInvoiceItem
          interval: PT5M
        target: acmeCo/RevenueScheduleItemInvoiceItem
      - resource:
          name: RevenueScheduleItemInvoiceItemAdjustment
          interval: PT5M
        target: acmeCo/RevenueScheduleItemInvoiceItemAdjustment
      - resource:
          name: Subscription
          interval: PT5M
        target: acmeCo/Subscription
