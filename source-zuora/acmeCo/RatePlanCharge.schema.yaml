{
  "$defs": {
    "Meta": {
      "properties": {
        "op": {
          "default": "u",
          "description": "Operation type (c: Create, u: Update, d: Delete)",
          "enum": [
            "c",
            "u",
            "d"
          ],
          "title": "Op",
          "type": "string"
        },
        "row_id": {
          "default": -1,
          "description": "Row ID of the Document, counting up from zero, or -1 if not known",
          "title": "Row Id",
          "type": "integer"
        }
      },
      "title": "Meta",
      "type": "object"
    }
  },
  "additionalProperties": true,
  "description": "Base document for all Zuora objects.",
  "properties": {
    "_meta": {
      "$ref": "#/$defs/Meta",
      "description": "Document metadata"
    },
    "Id": {
      "default": "",
      "title": "Id",
      "type": "string"
    },
    "UpdatedDate": {
      "anyOf": [
        {
          "format": "date-time",
          "type": "string"
        },
        {
          "type": "null"
        }
      ],
      "default": null,
      "title": "Updateddate"
    }
  },
  "title": "ZuoraDocument",
  "type": "object",
  "x-infer-schema": true,
  "if": {
    "required": [
      "_meta"
    ],
    "properties": {
      "_meta": {
        "required": [
          "op"
        ],
        "properties": {
          "op": {
            "const": "d"
          }
        }
      }
    }
  },
  "then": {
    "reduce": {
      "strategy": "merge",
      "delete": true
    }
  }
}
