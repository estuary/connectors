import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-redshift:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        exclude:
          - intStr64ToInt64
          - intStr64ToInt128
          - intStr64ToInt256
          - intStr64ToNum
          - intStr128ToInt128
          - intStr128ToInt256
          - intStr128ToNum
          - intStr256ToInt256
          - intStr256ToNum
          - intStr256ToNumStr
          - int64ToNumStr
          - int128ToNumStr
          - int256ToNumStr
          - numToNumStr
