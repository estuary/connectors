services:
  storage:
    image: minio/minio:latest
    command: server /data
    ports:
      - "9099:9000"
    environment:
      MINIO_ROOT_USER: test_key
      MINIO_ROOT_PASSWORD: test_secret
    networks:
      flow-test:
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:9000/minio/health/live"
        ]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s


networks:
  flow-test:
    external: true
