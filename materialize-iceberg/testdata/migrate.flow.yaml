import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-iceberg/rest-local:
    endpoint:
      local:
        command: ["go", "run", "./cmd/connector"]
        protobuf: true
        config: .local/config.rest-local.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: true
        include:
          # Materialize the object field so it exercises the JSON->text migration
          # (objects are FIELD_OPTIONAL and skipped by recommended selection).
          objectToString: {}
        exclude:
          # These type changes have no migration support in iceberg
          # (DECIMAL->LONG, STRING->DECIMAL, and STRING->DOUBLE): Validate
          # returns INCOMPATIBLE, which the control plane would resolve by
          # backfilling the binding. The test harness doesn't emulate that
          # resolution, so exclude them rather than let Apply skip the
          # migration and leave a column type the spec doesn't expect.
          - intStr000ToInt000
          - intStr000ToInt032
          - intStr000ToInt064
          - intStr064ToInt064
          - intStr129ToInt129
          - intStr129ToInt256
          - intStr129ToInt257
          - intStr129ToNum
          - intStr129ToNumStr
          - intStr256ToInt256
          - intStr256ToInt257
          - intStr256ToNum
          - intStr256ToNumStr
          - intStr257ToInt257
          - intStr257ToNum
          - intStr257ToNumStr

