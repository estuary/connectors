import:
  - ../../materialize-boilerplate/testdata/integration/collections.migrate-base.flow.yaml

materializations:
  acmeCo/tests/materialize-azure-fabric-warehouse:
    endpoint:
      local:
        command: ["go", "run", "."]
        protobuf: true
        config: config.yaml
    bindings:
    - resource:
        table: migrate
      source: key/value
      fields:
        recommended: 1
        include:
          # Materialize the object field so it exercises the JSON->text migration
          # (objects are FIELD_OPTIONAL and skipped by recommended selection).
          objectToString: {}
        exclude:
          - binaryToMulti
          - binary"With"Quote
          # TODO: Azure Fabric Warehouse maxes out at DECIMAL(38,0). Fixture values
          # for int128/int129/int256/int257 (39+ digits) overflow when stored in
          # either the source column (base phase) or migrated target column.
          - int128ToInt129
          - int128ToInt256
          - int128ToInt257
          - int128ToIntStr128
          - int128ToIntStr129
          - int128ToIntStr256
          - int128ToIntStr257
          - int128ToNum
          - int128ToNumStr
          - int128ToString
          - int129ToInt256
          - int129ToInt257
          - int129ToIntStr129
          - int129ToIntStr256
          - int129ToIntStr257
          - int129ToNum
          - int129ToNumStr
          - int129ToString
          - int256ToInt257
          - int256ToIntStr256
          - int256ToIntStr257
          - int256ToNum
          - int256ToNumStr
          - int256ToString
          - int257ToIntStr257
          - int257ToNum
          - int257ToNumStr
          - int257ToString
          - int000ToInt128
          - int000ToInt129
          - int000ToInt256
          - int000ToInt257
          - int032ToInt128
          - int032ToInt129
          - int032ToInt256
          - int032ToInt257
          - int064ToInt128
          - int064ToInt129
          - int064ToInt256
          - int064ToInt257
          - int065ToInt128
          - int065ToInt129
          - int065ToInt256
          - int065ToInt257
          - intStr000ToInt128
          - intStr000ToInt129
          - intStr000ToInt256
          - intStr000ToInt257
          - intStr064ToInt128
          - intStr064ToInt129
          - intStr064ToInt256
          - intStr064ToInt257
          - intStr065ToInt128
          - intStr065ToInt129
          - intStr065ToInt256
          - intStr065ToInt257
          - intStr128ToInt128
          - intStr128ToInt129
          - intStr128ToInt256
          - intStr128ToInt257
          - intStr129ToInt129
          - intStr129ToInt256
          - intStr129ToInt257
          - intStr256ToInt256
          - intStr256ToInt257
          - intStr257ToInt257
