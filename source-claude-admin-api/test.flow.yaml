import:
- acmeCo/flow.yaml
captures:
  acmeCo/source-claude-admin-api:
    endpoint:
      local:
        command:
        - poetry
        - run
        - python
        - -m
        - source_claude_admin_api
        config: config.yaml
    bindings:
    - resource:
        name: Organization
        interval: PT1H
      target: acmeCo/Organization
    - resource:
        name: Users
        interval: PT1H
      target: acmeCo/Users
    - resource:
        name: ClaudeCodeUsageReport
        interval: PT6H
      target: acmeCo/ClaudeCodeUsageReport
